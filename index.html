<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Interactiu GAL </title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #mapa { height: 100vh; width: 100%; } /* Ocupa tota la pantalla */
        
        /* Estils personalitzats pels popups per distingir-los visualment */
        .popup-gal h3 { color: #859198; margin-bottom: 5px; }

        .leaflet-tooltip.tooltip-gal {
            background: rgba(88, 141, 64, 0.9);
            color: white;
            border: 1px solid #5e8d44;
            border-radius: 4px;
            padding: 4px 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.25);
        }

        .map-status {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 1000;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 6px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.16);
            font-size: 14px;
            color: #222;
        }

        .map-status.error {
            border: 1px solid #e74c3c;
            color: #c0392b;
        }
    </style>
</head>
<body>

    <div id="mapa"></div>
    <div id="mapStatus" class="map-status">Carregant dades...</div>

    <script>
        // 1. Inicialitzar el mapa
        var map = L.map('mapa').setView([41.7, 1.7], 8);

        // Pane per mantenir la capa GALP sempre a sobre
        var galpPane = map.createPane('galpPane');
        galpPane.style.zIndex = 650;

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const statusEl = document.getElementById('mapStatus');
        let loadedLayers = 0;
        const totalLayers = 2;

        function showStatus(message, isError = false) {
            statusEl.textContent = message;
            statusEl.classList.toggle('error', isError);
        }

        function layerLoaded() {
            loadedLayers += 1;
            if (loadedLayers === totalLayers) {
                showStatus('Mapa carregat correctament');
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 3000);
            }
        }

        function loadJson(url) {
            return fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`No s'ha pogut carregar ${url} (estat ${response.status})`);
                    }
                    return response.json();
                });
        }

        // ==========================================
        // 2. CONFIGURACIÓ DE COLORS I ESTILS
        // ==========================================
        
        // Paletes de colors proporcionades
        const colorsGAL = ['#B1D75B', '#9FC85A', '#DED845', '#CFCB52', '#859198', '#A2B0B7', '#C3CFD6', '#D6E0E5', '#C7D7A3', '#B4BBB9', '#F2F3EC'];
        const galColorMap = new Map();

        function crearClau(feature, index) {
            return String(feature.properties.GAL || feature.properties.NOM || feature.properties.ID || feature.properties.OBJECTID || feature.properties.OBJECTID_1 || feature.properties.NOM_GAL || feature.properties.CODI || feature.properties.CODI_GAL || index);
        }

        function assignColorsGAL(data) {
            data.features.forEach((feature, idx) => {
                const key = crearClau(feature, idx);
                if (!galColorMap.has(key)) {
                    const color = colorsGAL[galColorMap.size % colorsGAL.length];
                    galColorMap.set(key, color);
                }
            });
        }

        function obtenirColorGAL(feature) {
            const key = crearClau(feature, feature.properties._galIndex || 0);
            return galColorMap.get(key) || colorsGAL[feature.properties._galIndex % colorsGAL.length];
        }

        // Funció per donar estil a la capa GAL amb color estable i vora del mateix color
        function estilGAL(feature) {
            console.log("Propietats del polígon:", feature.properties);
            let colorActual;
            // 1. Obtenim el número del camp N.GAL (es canvia el punt per un claudàtor si el camp té caràcters especials)
            // Nota: Si a QGIS el camp es diu literalment "N.GAL", en JavaScript s'ha d'escriure així:
            let codiGAL = Number(feature.properties['N. GAL']);

            // 2. Creem un diccionari per saber quin número correspon a cada lloc
            // Això ho fas un sol cop i et serveix de guia humana

            const nomsGAL = {
                1: "Associació pel Desenvolupament Rural de la Catalunya Central",
                2: "Associació per al Desenvolupament Rural Integral de la zona NordOriental de Catalunya",
                3: "Associació Leader Ripollès Ges Bisaura",
                4: "Consorci Leader de Desenvolupament Rural del Camp",
                5: "Consorci GAL Alt Urgell Cerdanya",
                6: "Consorci per al Desenvolupament del Baix Ebre i Montsià",
                7: "Associació Leader de Ponent",
                8: "Consorci Grup Acció Local Noguera-Segrià Nord",
                9: "Consorci Leader Pirineu Occidental",
                10: "Consorci per al Desenvolupament de la Catalunya Central",
                11: "Consorci Intercomarcal Iniciatives Socioeconòmiques"
            };
            // 3. Convertim el número en el nom utilitzant el diccionari
            let nomTerritori = nomsGAL[codiGAL];
            
            // 4. Ara fem el switch amb els noms (molt més visual i difícil d'equivocar-se!)

            switch (nomTerritori) {
                case "Associació pel Desenvolupament Rural de la Catalunya Central":
                    colorActual = '#777777';
                    break;
                case "Associació per al Desenvolupament Rural Integral de la zona NordOriental de Catalunya":
                    colorActual = '#f6dd00';
                    break;
                case "Associació Leader Ripollès Ges Bisaura":
                    colorActual = '#98b71b';
                    break;
                case "Consorci Leader de Desenvolupament Rural del Camp":
                    colorActual = '#777777';
                    break;
                case "Consorci GAL Alt Urgell Cerdanya":
                    colorActual = '#f6ec90';
                    break;
                case "Consorci per al Desenvolupament del Baix Ebre i Montsià":
                    colorActual = '#d0d0d0';
                    break;
                case "Associació Leader de Ponent":
                    colorActual = '#f6dd00';
                    break;
                case "Consorci Grup Acció Local Noguera-Segrià Nord":
                    colorActual = '#d0d0d0';
                    break;
                case "Consorci Leader Pirineu Occidental":
                    colorActual = '#98b71b';
                    break;
                case "Consorci per al Desenvolupament de la Catalunya Central":
                    colorActual = '#b6db20';
                    break;
                case "Consorci Intercomarcal Iniciatives Socioeconòmiques":
                    colorActual = '#b6db20';
                    break;
                default:
                    // Si és un número que no hem personalitzat, manté el color automàtic
                    colorActual = obtenirColorGAL(feature);
            }

            return {
                fillColor: colorActual,
                weight: 2,
                opacity: 1,
                color: colorActual,
                dashArray: '',
                fillOpacity: 0.7
            };
        }

        // ==========================================
        // 3. EFECTES HOVER (Ressaltar polígons)
        // ==========================================

        function ressaltarFeature(e) {
            var layer = e.target;
            layer.setStyle({
                weight: 5,
                color: '#666',
                dashArray: '',
                fillOpacity: 0.7
            });
            layer.bringToFront(); // Fa que la vora no quedi tapada pels polígons del costat
        }

        // Funcions per restaurar l'estil quan el ratolí marxa
        function restaurarEstilGAL(e) {
            capaGAL.resetStyle(e.target);
        }


        // ==========================================
        // 4. CONFIGURACIÓ DELS POPUPS DIFERENTS
        // ==========================================

        function onEachFeatureGAL(feature, layer) {
            // Obtenim les dades (adapta 'nom' i 'web' a les teves columnes de QGIS)
            let nom_gal = feature.properties.GAL || feature.properties.NOM || "Gal";
            let web_gal = feature.properties.pag_web || feature.properties.WEB || "#";
            
            // Disseny exclusiu pel GAL
            let popupContent = `<div class="popup-gal">
                                    <h3> Grup d'Acció Local </h3>
                                    <strong>${nom_gal}</strong><br><br>`;
            if (web_gal !== "#") popupContent += `<a href="${web_gal}" target="_blank">🌐 Visitar pàgina web</a>`;
            popupContent += `</div>`;

            layer.bindPopup(popupContent);
            layer.bindTooltip(`<strong>${nom_gal}</strong>`, {
                sticky: true,
                direction: 'auto',
                className: 'tooltip-gal'
            });

            // Afegim els esdeveniments del ratolí
            layer.on({
                mouseover: ressaltarFeature,
                mouseout: restaurarEstilGAL
            });
        }

        
        // ==========================================
        // 5. CARREGAR LES DADES
        // ==========================================

        let capaGAL;
        // Carregar GAL
        loadJson('gal_data.geojson')
            .then(data => {
                data.features.forEach((feature, idx) => {
                    feature.properties._galIndex = idx;
                });
                assignColorsGAL(data);
                capaGAL = L.geoJSON(data, {
                    style: estilGAL,
                    onEachFeature: onEachFeatureGAL
                }).addTo(map);
                layerLoaded();
            })
            .catch(err => {
                console.error('Error carregant GAL:', err);
                showStatus(`Error carregant GAL: ${err.message}`, true);
            });

    </script>
</body>
</html>
